
<app-header

  [isEnglish]="languageService.isEnglish"

  (langToggle)="toggleLanguage()">

<div class="d-flex flex-wrap">
  <app-side-bar class="col-12 col-sm-12 col-md-6 col-lg-4" [isEnglish]="languageService.isEnglish"></app-side-bar>
  <app-work class="col-12 col-sm-12 col-md-6 col-lg-8" [isEnglish]="languageService.isEnglish"></app-work>
</div>
