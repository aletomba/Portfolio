<div class="wrapper d-flex flex-wrap">

  <div class="work-header col-12">
    <h2 class="work-title"><i class="uil uil-github"></i> {{ labels.title }}</h2>
    <mat-divider></mat-divider>
  </div>

  <div class="lang-filters col-12" *ngIf="!isLoading && allLanguages.length > 1">
    <button
      class="lang-chip"
      [class.active]="selectedLanguage === null"
      (click)="selectLanguage(null)">
      {{ labels.filterAll }}
    </button>
    <button
      *ngFor="let lang of allLanguages; trackBy: trackByLang"
      class="lang-chip"
      [class.active]="selectedLanguage === lang"
      [style.--chip-color]="getLanguageColor(lang)"
      (click)="selectLanguage(lang)">
      <span class="chip-dot"></span>{{ lang }}
    </button>
  </div>

  <div *ngIf="isLoading" class="skeleton-container d-flex flex-wrap">
    <div class="block-repo col-12 col-sm-12 col-md-12 col-lg-4" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="block-repo-in">
        <div class="skeleton-preview skeleton"></div>
        <div class="card-body">
          <div class="skeleton-title skeleton"></div>
          <div class="skeleton-desc skeleton"></div>
          <div class="skeleton-desc skeleton short"></div>
          <div class="skeleton-meta skeleton"></div>
        </div>
      </div>
    </div>
  </div>

  <p *ngIf="hasError" class="status-message error-message">{{ labels.errorMessage }}</p>

  <div
    class="block-repo col-12 col-sm-12 col-md-12 col-lg-4"
    *ngFor="let item of filteredRepos; trackBy: trackByRepoId">
    <div class="block-repo-in">
      <div class="card-preview">
        <img [src]="getPreviewImage(item.name)" [alt]="item.name" loading="lazy">
        <div class="card-overlay" *ngIf="getMeta(item.name)?.demoUrl">
          <a [href]="getMeta(item.name)?.demoUrl" target="_blank" rel="noopener noreferrer" class="demo-btn">
            Demo <i class="uil uil-external-link-alt"></i>
          </a>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title-row">
          <div class="title">{{ item.name }}</div>
          <a [href]="item.html_url" target="_blank" rel="noopener noreferrer" [attr.aria-label]="labels.viewRepo" class="github-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="12" height="16" aria-hidden="true">
              <path fill-rule="evenodd" d="M11 10h1v3c0 .55-.45 1-1 1H1c-.55 0-1-.45-1-1V3c0-.55.45-1 1-1h3v1H1v10h10v-3zM6 2l2.25 2.25L5 7.5 6.5 9l3.25-3.25L12 8V2H6z"></path>
            </svg>
          </a>
        </div>
        <div class="descripcion">{{ item.description }}</div>
        <div class="repo-meta d-flex">
          <span class="language-badge" *ngIf="item.language" [style.--lang-color]="getLanguageColor(item.language)">
            <span class="language-dot"></span>
            {{ item.language }}
          </span>
          <span class="repo-stat" *ngIf="item.stargazers_count > 0">
            <i class="uil uil-star"></i> {{ item.stargazers_count }}
          </span>
          <span class="repo-stat" *ngIf="item.forks_count > 0">
            <i class="uil uil-code-branch"></i> {{ item.forks_count }}
          </span>
          <span
            class="project-type-badge"
            *ngIf="getMeta(item.name)"
            [attr.data-type]="getMeta(item.name)?.type">
            {{ getTypeLabel(getMeta(item.name)?.type) }}
          </span>
        </div>
      </div>
    </div>
  </div>

</div>
